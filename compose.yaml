# compose.yaml
# This is the compose.yaml file for running the docker compose

services:
  core_app:
    build:
      context: .
      dockerfile: Dockerfile.core_app
      args:
        APP_PORT: ${APP_PORT}
        APP_DIR: ${APP_DIR}
    restart: always
    env_file:
      - ".env"
      - ".env.webapp"
    ports:
      - "${PUBLISH_PORT}:${APP_PORT}"
    depends_on:
      database:
        condition: service_healthy
        restart: true
        required: true

  database:
    # image: postgres:18.4-bookworm
    image: postgres:18.4-bookworm

    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    healthcheck:
      # test: [ "CMD-SHELL", "pg_isready" ]
      # test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME}" ] # This will not work also
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql
